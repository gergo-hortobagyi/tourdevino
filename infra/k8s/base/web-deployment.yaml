apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: tourdevino
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: tourdevino/web:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tourdevino-config
          ports:
            - containerPort: 40000
          readinessProbe:
            httpGet:
              path: /
              port: 40000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 40000
            initialDelaySeconds: 10
            periodSeconds: 20
