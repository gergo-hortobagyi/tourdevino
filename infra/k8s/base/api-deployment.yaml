apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tourdevino
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: tourdevino/api:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tourdevino-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tourdevino-secrets
                  key: DATABASE_URL
            - name: SHADOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tourdevino-secrets
                  key: SHADOW_DATABASE_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: tourdevino-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: tourdevino-secrets
                  key: JWT_REFRESH_SECRET
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: tourdevino-secrets
                  key: STRIPE_WEBHOOK_SECRET
          ports:
            - containerPort: 40001
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 40001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 40001
            initialDelaySeconds: 10
            periodSeconds: 15
