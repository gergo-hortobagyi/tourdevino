apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: tourdevino
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: tourdevino/api:dev
          command: ["pnpm", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tourdevino-secrets
                  key: DATABASE_URL
