apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tourdevino
resources:
  - ../../base
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: tourdevino-secrets
    envs:
      - .env.k8s
patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: ConfigMap
      name: tourdevino-config
    patch: |-
      - op: replace
        path: /data/NUXT_PUBLIC_API_BASE_URL
        value: http://localhost:40001/api
