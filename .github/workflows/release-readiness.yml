name: release-readiness

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:integration
      - run: pnpm test:e2e

  build-images:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t tourdevino/api:${{ github.sha }} .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t tourdevino/web:${{ github.sha }} .

  manifests:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Verify K8s overlays render
        run: |
          kubectl kustomize infra/k8s/overlays/local >/dev/null
          kubectl kustomize infra/k8s/overlays/dev >/dev/null
          kubectl kustomize infra/k8s/overlays/staging >/dev/null
          kubectl kustomize infra/k8s/overlays/prod >/dev/null
